name: build next js aplication

on: 
 push: 
   branches: [main]


jobs:
 build:
  runs-on: ubuntu-latest


  steps:
    - name: checkout repository
      uses:  actions/checkout@v6.0.2

    - name: Setup Node js
      uses: actions/setup-node@v6.3.0
      with: 
       version: 22.x
       cache: "npm"

    - name: Install dependencies
      run: npm install

    - name: build node js app
      run: npm run build 

    - name: upload build on artifact
      uses: actions/upload-artifact@v7.0.0
      with:
        name: nextjs-build
        path: out/
  
